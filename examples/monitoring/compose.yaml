# stack-agent full monitoring stack example
# Copy this directory to your host and add a config.yaml for stack-agent.
# See ../../config.example.yaml for reference.

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  stack-agent-data:

services:
  stack-agent:
    image: ghcr.io/rcarson/stack-agent:latest
    restart: unless-stopped
    networks:
      - monitoring
    environment:
      - STACK_AGENT_LOG_LEVEL=info
      - STACK_AGENT_HTTP_ADDR=:2112
      # Set your token here or in a .env file:
      # - STACK_AGENT_DEFAULT_TOKEN=${STACK_AGENT_DEFAULT_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yaml:/etc/stack-agent/config.yaml:ro
      - stack-agent-data:/var/lib/stack-agent
    ports:
      - "2112:2112"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2112/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
