version: "2"

formatters:
  enable:
    - gofmt

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
  settings:
    errcheck:
      # Don't require checking errors on fmt.Fprintf/fmt.Fprintln to stderr.
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln

issues:
  exclusions:
    rules:
      # Test files are allowed to use t.Fatal without wrapping errors.
      - path: _test\.go
        linters:
          - errcheck
